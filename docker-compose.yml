services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    image: voice-agents-local-landing:latest
    container_name: voice-agents-local-landing
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voice-agents-local.rule=Host(`voice-agents-local.prin7r.com`)"
      - "traefik.http.routers.voice-agents-local.entrypoints=websecure"
      - "traefik.http.routers.voice-agents-local.tls.certresolver=letsencrypt"
      - "traefik.http.services.voice-agents-local.loadbalancer.server.port=3000"
